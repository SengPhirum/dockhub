# Local development swarm:
#   npm run dev:swarm
#
# Default footprint: one manager running KNetraHub and one worker. Add the
# optional second worker for broader scheduling tests with:
#   npm run dev:swarm:full

x-swarm-common: &swarm-common
  privileged: true
  init: true
  stop_grace_period: 45s
  networks:
    - knetrahub-dev

x-worker-node: &worker-node
  <<: *swarm-common
  image: ${DOCKER_DIND_IMAGE:-docker:29-dind}
  entrypoint: ["/bin/sh", "/usr/local/bin/knetrahub-swarm-dev"]
  command: ["worker"]
  depends_on:
    - swarm-manager
  environment:
    DOCKER_TLS_CERTDIR: ""
    DOCKERD_ARGS: "--log-level=warn --iptables=false --ip-masq=false --tls=false --host=tcp://0.0.0.0:2375"
    SWARM_MANAGER_HOST: "swarm-manager"
    # swarm-entrypoint.sh runs the same agent/index.mjs script directly
    # against this node's local Docker socket, reporting to the manager's
    # app - same role as the knetrahub-agent global service in prod.
    KNETRAHUB_AGENT_URL: "http://swarm-manager:3000/api/agent/report"
    # Shared secret with the manager's NUXT_AGENT_TOKEN below - keep in sync.
    KNETRAHUB_AGENT_TOKEN: "change-me-to-a-long-random-string"
  volumes:
    - ./docker/dev/swarm-entrypoint.sh:/usr/local/bin/knetrahub-swarm-dev:ro
    - ./agent:/agent:ro
    - knetrahub-swarm-state:/swarm

services:
  # Single Postgres + TimescaleDB instance for app data + metrics history -
  # plain compose service (not part of the nested swarm), reachable from
  # swarm-manager by hostname on the knetrahub-dev network.
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    hostname: timescaledb
    networks:
      - knetrahub-dev
    environment:
      POSTGRES_DB: knetrahub
      POSTGRES_USER: knetrahub
      POSTGRES_PASSWORD: knetrahub
    volumes:
      - knetrahub-timescale-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  swarm-manager:
    <<: *swarm-common
    build:
      context: .
      dockerfile: docker/dev/Dockerfile.ubuntu-swarm
      args:
        DOCKER_DIND_IMAGE: ${DOCKER_DIND_IMAGE:-docker:29-dind}
    hostname: swarm-manager
    command: ["manager"]
    depends_on:
      - timescaledb
    env_file:
      - .env
    environment:
      DOCKER_TLS_CERTDIR: ""
      DOCKERD_ARGS: "--log-level=warn --iptables=false --ip-masq=false --tls=false --host=tcp://0.0.0.0:2375"
      KNETRAHUB_RUN_APP: "true"
      NODE_ENV: "development"
      HOST: "0.0.0.0"
      PORT: "3000"
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_SSR: "false"
      NUXT_DOCKER_SOCKET_PATH: "/var/run/docker.sock"
      NUXT_DOCKER_HOST: ""
      NUXT_DOCKER_PORT: ""
      CHOKIDAR_USEPOLLING: "true"
      VITE_USE_POLLING: "true"
      WATCHPACK_POLLING: "true"
      # The manager's knetrahub-agent process talks to the app in the same container.
      KNETRAHUB_AGENT_URL: "http://localhost:3000/api/agent/report"
      KNETRAHUB_AGENT_TOKEN: "change-me-to-a-long-random-string"
      # Shared secret the report endpoint checks against - keep in sync with
      # KNETRAHUB_AGENT_TOKEN above and on every worker node.
      NUXT_AGENT_TOKEN: "change-me-to-a-long-random-string"
      # Postgres + TimescaleDB - app data and metrics history, one instance.
      NUXT_DB_HOST: "timescaledb"
      NUXT_DB_PORT: "5432"
      NUXT_DB_NAME: "knetrahub"
      NUXT_DB_USER: "knetrahub"
      NUXT_DB_PASSWORD: "knetrahub"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - ./agent:/agent:ro
      - knetrahub-manager-docker:/var/lib/docker
      - knetrahub-swarm-state:/swarm
      - knetrahub-node-modules:/workspace/node_modules
      - knetrahub-nuxt:/workspace/.nuxt

  swarm-worker-1:
    <<: *worker-node
    hostname: swarm-worker-1
    volumes:
      - ./docker/dev/swarm-entrypoint.sh:/usr/local/bin/knetrahub-swarm-dev:ro
      - ./agent:/agent:ro
      - knetrahub-swarm-state:/swarm

  swarm-worker-2:
    <<: *worker-node
    profiles:
      - full
    hostname: swarm-worker-2
    volumes:
      - ./docker/dev/swarm-entrypoint.sh:/usr/local/bin/knetrahub-swarm-dev:ro
      - ./agent:/agent:ro
      - knetrahub-swarm-state:/swarm

networks:
  knetrahub-dev:

volumes:
  knetrahub-manager-docker:
  knetrahub-swarm-state:
  knetrahub-node-modules:
  knetrahub-nuxt:
  knetrahub-timescale-data:

# Deploy KNetraHub static documentation to GitHub Pages
#
# Triggered on every push to main, or manually via workflow_dispatch.
# Builds ONLY the /documentation page as fully static HTML — no Docker or
# database needed at build time.
#
# Setup (one-time):
#   1. Go to your repo → Settings → Pages
#   2. Under "Build and deployment" select Source: "GitHub Actions"
#   3. Push to main (or run this workflow manually) — done.
#
# The published URL will be:
#   https://<your-username>.github.io/<repo-name>/documentation
#
# If you use a custom domain or a user/org site (username.github.io),
# set NUXT_DOCS_BASE_URL to "/" in the env section below.

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      # Re-deploy whenever documentation content or the docs build config changes
      - 'app/pages/documentation.vue'
      - 'app/components/DocsSidebar.vue'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Allow one concurrent deployment; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build static docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # Install all deps including better-sqlite3 native build
      # (ubuntu-latest ships Python 3, make, and g++ required by node-gyp)
      - name: Install dependencies
        run: npm ci

      # Generate static docs only (/documentation route)
      - name: Build static documentation
        run: npm run build:docs
        env:
          NUXT_STATIC_DOCS: 'true'
          # ── CHANGE THIS ───────────────────────────────────────────────────
          # Set to /  if you use a custom domain or username.github.io site
          # Set to /<repo-name>/  for a project site (github.io/<repo-name>)
          NUXT_DOCS_BASE_URL: '/knetrahub/'
          # ─────────────────────────────────────────────────────────────────
          # Dummy values so Nuxt runtime-config validation passes at build time
          NUXT_JWT_SECRET: 'docs-build-placeholder'
          NUXT_ADMIN_USERNAME: 'admin'
          NUXT_ADMIN_PASSWORD: 'placeholder'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
